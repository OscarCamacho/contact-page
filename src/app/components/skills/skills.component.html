<div *ngIf="display$ | async" class="card gallery">
  <h2>My Skills</h2>
  <ul class="skill-list">
    <li *ngFor="let skill of skills$ | async" (click)="selectSkill(skill)">
      <img [src]="skill.logoPath" [ngClass]="resolveSkillListIconClass(skill.logoOrientation)">
      {{skill.name}}
    </li>
  </ul>
  <div class="skill-container">
    <div class="skill" *ngIf="selectedSkill$ | async as skill">
      <h3>{{skill.name}}</h3>
      <img id="skill-logo" src="{{skill.logoPath}}" [ngClass]="resolveSkillLogoClass(skill.logoOrientation)">
      <div class="text-container">
        <p *ngIf="skill.description">{{skill.description}}</p>
        <p>{{skill.proficiency}} proficiency level</p>
        <p>{{skill.yearsOfExperience}} years of experience</p>
        <div *ngIf="skill.frameworks">
          <div class="framework" *ngFor="let frame of skill.frameworks">
            <h4>{{frame.name}}</h4>
            <img id="frame-logo" src="{{frame.logoPath}}" [ngClass]="resolveSubSkillLogoClass(frame.logoOrientation)">
            <div class="text-container">
              <p *ngIf="frame.description">{{frame.description}}</p>
              <p>{{frame.proficiency}} proficiency level</p>
              <p>{{frame.yearsOfExperience}} years of experience</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
